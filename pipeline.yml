# pipeline.yml — one config for this project. You choose the folder with: uv run main.py --video_id <folder>
# Optional: which video and VTT to use (filenames inside data/<folder>/). If omitted, first .mp4 and all .vtt.
# Per-folder overrides: add a "videos" map and set video_file / vtt_file per folder.
default:
  agent_images: ide
  agent_dedup: ide
  batch_size: 10
  # video_file: "Lesson 2. Levels part 1.mp4"   # optional
  # vtt_file: "Lesson 2. Levels part 1.vtt"    # optional

# Optional: per-folder overrides (folder name = --video_id)
videos:
  "Lesson 2. Levels part 1":
    video_file: "Lesson 2. Levels part 1.mp4"
    vtt_file: "Lesson 2. Levels part 1.vtt"
